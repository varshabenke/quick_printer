<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    h2 {
      text-align: center;
      padding: 10px;
    }

    .card {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    button {
      padding: 8px 12px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .print { background: green; color: white; }
    .fail { background: red; color: white; }

    .status {
      font-weight: bold;
    }

    .done { color: green; }
    .failed { color: red; }
    .payment_pending { color: orange; }
  </style>
</head>

<body>

<h2>🖨️ Orders Dashboard</h2>

<div id="orders"></div>

<script>
async function loadOrders() {
  const res = await fetch('/admin/orders');
  const data = await res.json();

  const container = document.getElementById("orders");
  container.innerHTML = "";

  data.forEach(order => {
    container.innerHTML += `
      <div class="card">
        <b>ID:</b> ${order.id}<br>
        <b>User:</b> ${order.user_id}<br>
        <b>Pages:</b> ${order.pages}<br>
        <b>Copies:</b> ${order.copies}<br>
        <b>Type:</b> ${order.print_type}<br>
        <b>Amount:</b> ₹${order.amount}<br>
        <b>Status:</b> <span class="status ${order.status}">${order.status}</span><br>

        <button class="print" onclick="reprint('${order.id}')">🖨️ Print</button>
        <button class="fail" onclick="markFailed('${order.id}')">❌ Fail</button>
      </div>
    `;
  });
}

async function reprint(orderId) {
  await fetch(`/admin/reprint/${orderId}`, { method: 'POST' });
  alert("Print triggered");
}

async function markFailed(orderId) {
  await fetch(`/admin/mark-failed/${orderId}`, { method: 'POST' });
  alert("Marked as failed");
}

setInterval(loadOrders, 3000);
loadOrders();
</script>

</body>
</html>
